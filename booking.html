<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Забронировать столик в кафе Пармезан, Клинцы.">
  <link rel="icon" type="image/png" href="images/brand/favicon.png">
  <title>Бронирование — Пармезан</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/main.css?v=3">
  <link rel="stylesheet" href="css/pages/booking.css">
</head>
<body>
  <main>
    <section class="page-hero">
      <div class="page-hero-inner">
        <span class="section-eyebrow">Резерв</span>
        <h1>Бронирование</h1>
      </div>
    </section>

    <section class="booking-form-section">
      <div class="container">
        <div class="booking-intro fade-up">
          <h2>Забронировать столик</h2>
          <p>Оставьте заявку — мы свяжемся с вами для подтверждения</p>
        </div>
        <div class="booking-form">
          <div class="booking-form-content">
            <form id="booking-form" novalidate>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="guest-name">Имя</label>
                  <input type="text" id="guest-name" class="form-input" placeholder="Ваше имя" required>
                </div>
                <div class="form-group">
                  <label class="form-label" for="guest-phone">Телефон</label>
                  <input type="tel" id="guest-phone" class="form-input" placeholder="+7 (___) ___-__-__" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" for="guest-count">Гостей</label>
                  <select id="guest-count" class="form-select" required>
                    <option value="">Количество</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8+</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label" for="booking-date">Дата</label>
                  <input type="date" id="booking-date" class="form-input" required>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label" for="booking-time">Время</label>
                <select id="booking-time" class="form-select" required>
                  <option value="">Выберите время</option>
                  <option value="10:00">10:00</option>
                  <option value="11:00">11:00</option>
                  <option value="12:00">12:00</option>
                  <option value="13:00">13:00</option>
                  <option value="14:00">14:00</option>
                  <option value="15:00">15:00</option>
                  <option value="16:00">16:00</option>
                  <option value="17:00">17:00</option>
                  <option value="18:00">18:00</option>
                  <option value="19:00">19:00</option>
                  <option value="20:00">20:00</option>
                  <option value="21:00">21:00</option>
                  <option value="22:00">22:00</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="booking-comment">Пожелания</label>
                <textarea id="booking-comment" class="form-textarea" placeholder="Особые предпочтения, повод..."></textarea>
              </div>
              <button type="submit" class="btn btn-primary" style="width:100%;margin-top:var(--spacing-md)">Отправить заявку</button>
            </form>
          </div>
          <div class="form-success">
            <h3>Заявка принята</h3>
            <p>Мы свяжемся с вами для подтверждения брони.</p>
          </div>
        </div>
        <p class="booking-info">Или по телефону <a href="tel:+79065056858">+7 (906) 505-68-58</a></p>
      </div>
    </section>
  </main>

  <script src="js/components.js?v=2"></script>
  <script src="js/booking.js"></script>
</body>
</html>
