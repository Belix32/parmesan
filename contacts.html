<!DOCTYPE html>

<head>

<body>

      <div class="page-hero-inner">
        <span class="section-eyebrow">Связь</span>
        <h1>Контакты</h1>

    </section>

    <section class="section">
      <div class="container">
        <div class="contacts-grid">
          <div class="contacts-info">
            <h2>Как нас найти</h2>

            <div class="contact-card fade-up">
              <span class="contact-label"><img src="images/brand/icon-map.png" alt="" width="20" height="20"></span>
              <div class="contact-detail">
                <h4>Адрес</h4>
                <p>Брянская обл., г. Клинцы<br>ул. Октябрьская, 68</p>
              </div>
            </div>

            <div class="contact-card fade-up">
              <span class="contact-label"><img src="images/brand/icon-phone.png" alt="" width="20" height="20"></span>
              <div class="contact-detail">
                <h4>Телефон</h4>
                <a href="tel:+79065056858">+7 (906) 505-68-58</a>
              </div>
            </div>

            <div class="contact-card fade-up">
              <span class="contact-label"><img src="images/brand/icon-clock.png" alt="" width="20" height="20"></span>
              <div class="contact-detail">
                <h4>Часы работы</h4>
                <p>Ежедневно 10:00–23:00<br>Доставка с 11:00</p>
              </div>
            </div>

            <div class="contact-card fade-up">
              <span class="contact-label">Св.</span>
              <div class="contact-detail">
                <h4>Связь</h4>
                <div class="social-links">
                  <a href="https://wa.me/79065056858" class="social-link" target="_blank" rel="noopener">Wa</a>
                  <a href="tel:+79065056858" class="social-link">Tel</a>
                </div>
              </div>
            </div>

            <div class="contact-card fade-up">
              <span class="contact-label">Зак.</span>
              <div class="contact-detail">
                <h4>Онлайн-заказ</h4>
                <a href="https://parmesan-klintsy.ru" target="_blank" rel="noopener">parmesan-klintsy.ru</a>
              </div>
            </div>
          </div>

          <div class="contacts-map fade-up">
            <iframe
              src="https://yandex.ru/map-widget/v1/?ll=32.237000%2C52.758000&mode=search&text=Клинцы%20Октябрьская%2068%20Пармезан&z=17"
              allowfullscreen
              loading="lazy"
              title="Карта — Пармезан, ул. Октябрьская, 68">
            </iframe>
          </div>
